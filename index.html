<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0D1117" />
    <!--
      Content Security Policy. Restricts what the WebView/browser is allowed to
      execute and connect to, so an XSS or compromised CDN can't exfiltrate the
      user's Supabase session, Finnhub key, or stored PIN hash.

      script-src 'self' only — no inline scripts, no external script CDNs.
      style-src includes 'unsafe-inline' because Tailwind / Vite emit inline
      <style> blocks during HMR and for keyframes; this is the standard
      compromise for SPAs without a separate build step.
      connect-src enumerates every host the app legitimately calls out to.
      frame-ancestors 'none' prevents clickjacking via iframe embedding.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://finnhub.io https://api.coingecko.com https://query1.finance.yahoo.com https://query2.finance.yahoo.com https://open.er-api.com;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
      form-action 'self';
    " />
    <title>Nexus Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Static loading fallback. Paints on the very first frame of the WebView,
      before Vite has finished loading the bundle. Gets replaced as soon as
      React mounts. Styled inline to match App.tsx's sessionLoading view so
      the handoff between this and React's loading screen is seamless — no
      black flash, no font swap pop.
    -->
    <div id="root">
      <div style="
        position: fixed;
        inset: 0;
        background: #0D1117;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #7D8590;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
      ">Loading</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
