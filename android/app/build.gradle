apply plugin: 'com.android.application'

// ── Release signing ──────────────────────────────────────────────────────
// Loads keystore credentials from android/key.properties (gitignored). If
// the file is absent (fresh clone, CI without secrets, debug-only build)
// we fall through to no signing config on release — `assembleRelease` will
// then produce an unsigned APK and `bundleRelease` will fail loudly, which
// is the correct signal that release signing isn't configured yet.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.limecore.nexus"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.limecore.nexus"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 20
        versionName "1.5.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                // Enable both v1 (jar signing) and v2 (APK Signature Scheme).
                // v2 is required for Android 7.0+, v1 is required so Android
                // 6.0 and earlier (minSdk 26 here means we're fine without v1,
                // but enabling it costs nothing and broadens compatibility).
                v1SigningEnabled true
                v2SigningEnabled true
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

// The Capacitor template originally included a conditional `apply plugin:`
// block here for the GMS Gradle plugin (used to bootstrap Firebase Cloud
// Messaging from a config JSON). That block has been removed so the build
// has zero classpath references to Play-Services-bound plugins — required
// for F-Droid compliance, since the fdroidserver scanner flags those
// references as non-free dependencies even when the plugin is unused at
// runtime.
//
// We don't need it: the app uses @capacitor/local-notifications for the
// Weekly Review reminder, which is purely on-device (AlarmManager +
// NotificationManager). No FCM is wired anywhere.
//
// If you ever add FCM, restore the plugin and accept that the F-Droid
// listing will gain a NonFreeDep anti-feature — or use a Gradle build
// flavor to ship FOSS and Play-Services variants separately.
